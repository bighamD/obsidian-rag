<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">V3.12.4 Unified Knowledge Routing 主流程</title>
  <desc id="desc">展示 Planner 判断是否检索、Collection Router 选择知识库、多库融合重排、MCP Tool 和 ContextBuilder 汇总的端到端流程。</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#07182b"/><stop offset="1" stop-color="#10243b"/></linearGradient><filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity=".25"/></filter><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#75d2ff"/></marker></defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
  <text x="600" y="62" text-anchor="middle" fill="#f4f8ff" font-size="34" font-weight="700">V3.12.4 Unified Knowledge Routing</text>
  <text x="600" y="94" text-anchor="middle" fill="#a9dfff" font-size="17">Planner 决定是否查 · Router 决定查哪里 · Retrieval 决定返回什么</text>
  <g filter="url(#shadow)" font-family="Arial, sans-serif">
    <rect x="60" y="150" width="210" height="116" rx="12" fill="#183654" stroke="#34bfff" stroke-width="2"/><text x="165" y="193" text-anchor="middle" fill="#fff" font-size="22" font-weight="700">Planner</text><text x="165" y="225" text-anchor="middle" fill="#c9def1" font-size="15">search / tool / no_search</text>
    <rect x="350" y="150" width="240" height="116" rx="12" fill="#15463e" stroke="#3fd0a2" stroke-width="2"/><text x="470" y="193" text-anchor="middle" fill="#fff" font-size="21" font-weight="700">Collection Router</text><text x="470" y="225" text-anchor="middle" fill="#c9e9df" font-size="15">RetrievalScope</text>
    <rect x="670" y="150" width="220" height="116" rx="12" fill="#3b356a" stroke="#9a84ff" stroke-width="2"/><text x="780" y="193" text-anchor="middle" fill="#fff" font-size="21" font-weight="700">Search Executor</text><text x="780" y="225" text-anchor="middle" fill="#ded8ff" font-size="15">selected_collections[]</text>
    <rect x="950" y="150" width="190" height="116" rx="12" fill="#15463e" stroke="#3fd0a2" stroke-width="2"/><text x="1045" y="193" text-anchor="middle" fill="#fff" font-size="21" font-weight="700">MCP Tool</text><text x="1045" y="225" text-anchor="middle" fill="#c9e9df" font-size="15">Tool Observation</text>
    <path d="M270 208 H350" stroke="#75d2ff" stroke-width="3" marker-end="url(#arrow)"/><path d="M590 208 H670" stroke="#75d2ff" stroke-width="3" marker-end="url(#arrow)"/><path d="M270 235 C460 340 850 330 950 235" fill="none" stroke="#75d2ff" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="110" y="355" width="270" height="170" rx="12" fill="#183654" stroke="#34bfff" stroke-width="2"/><text x="245" y="397" text-anchor="middle" fill="#fff" font-size="21" font-weight="700">food_safety</text><text x="245" y="431" text-anchor="middle" fill="#c9def1" font-size="15">Dense + Keyword + RRF</text><text x="245" y="463" text-anchor="middle" fill="#c9def1" font-size="15">candidate_k</text>
    <rect x="465" y="355" width="270" height="170" rx="12" fill="#183654" stroke="#34bfff" stroke-width="2"/><text x="600" y="397" text-anchor="middle" fill="#fff" font-size="21" font-weight="700">recipes</text><text x="600" y="431" text-anchor="middle" fill="#c9def1" font-size="15">Dense + Keyword + RRF</text><text x="600" y="463" text-anchor="middle" fill="#c9def1" font-size="15">candidate_k</text>
    <rect x="820" y="355" width="270" height="170" rx="12" fill="#3b356a" stroke="#9a84ff" stroke-width="2"/><text x="955" y="397" text-anchor="middle" fill="#fff" font-size="21" font-weight="700">Global Reranker</text><text x="955" y="431" text-anchor="middle" fill="#ded8ff" font-size="15">跨库候选统一相关性评分</text><text x="955" y="463" text-anchor="middle" fill="#ded8ff" font-size="15">global top_k</text>
    <path d="M780 266 C700 315 245 300 245 355" fill="none" stroke="#75d2ff" stroke-width="3" marker-end="url(#arrow)"/><path d="M780 266 C730 315 600 300 600 355" fill="none" stroke="#75d2ff" stroke-width="3" marker-end="url(#arrow)"/><path d="M380 440 H820" stroke="#75d2ff" stroke-width="3" marker-end="url(#arrow)"/><path d="M735 470 H820" stroke="#75d2ff" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="260" y="610" width="680" height="105" rx="12" fill="#15463e" stroke="#3fd0a2" stroke-width="2"/><text x="600" y="650" text-anchor="middle" fill="#fff" font-size="23" font-weight="700">ContextBuilder → Answer</text><text x="600" y="684" text-anchor="middle" fill="#c9e9df" font-size="15">Memory + Knowledge Chunks + Tool Observations</text>
    <path d="M955 525 C930 590 760 575 760 610" fill="none" stroke="#75d2ff" stroke-width="3" marker-end="url(#arrow)"/><path d="M1045 266 C1120 500 900 570 860 610" fill="none" stroke="#75d2ff" stroke-width="3" marker-end="url(#arrow)"/>
  </g>
</svg>
