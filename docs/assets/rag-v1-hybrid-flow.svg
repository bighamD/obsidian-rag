<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">V1 Hybrid Search 请求流程</title>
  <desc id="desc">FastAPI 收到 hybrid 查询后，同时执行 dense search 和 keyword search，再交给 RRF 融合。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#0f766e" />
    </marker>
    <style>
      .title { font: 700 32px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .subtitle { font: 500 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
      .lane-title { font: 700 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .box-title { font: 700 19px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .box-body { font: 500 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .line { stroke: #0f766e; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .api { fill: #eef2ff; stroke: #818cf8; stroke-width: 2; rx: 14; }
      .dense { fill: #eff6ff; stroke: #60a5fa; stroke-width: 2; rx: 14; }
      .keyword { fill: #fffbeb; stroke: #f59e0b; stroke-width: 2; rx: 14; }
      .fusion { fill: #ecfdf5; stroke: #22c55e; stroke-width: 2; rx: 14; }
      .output { fill: #f8fafc; stroke: #94a3b8; stroke-width: 2; rx: 14; }
      .lane { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 2; rx: 18; }
    </style>
  </defs>

  <rect width="1280" height="760" fill="#ffffff" />
  <text x="64" y="64" class="title">V1 Hybrid Search 流程</text>
  <text x="64" y="96" class="subtitle">同一个 query 被拆到 dense 和 keyword 两条召回路径，最后统一成 JSON response。</text>

  <rect x="64" y="130" width="1152" height="112" class="lane" />
  <text x="88" y="164" class="lane-title">入口层：FastAPI</text>
  <rect x="256" y="154" width="230" height="64" class="api" />
  <text x="296" y="183" class="box-title">POST /search</text>
  <text x="286" y="206" class="box-body">mode = hybrid</text>
  <rect x="744" y="154" width="230" height="64" class="api" />
  <text x="784" y="183" class="box-title">请求模型校验</text>
  <text x="782" y="206" class="box-body">query、top_k、filters</text>
  <path d="M486 186 H744" class="line" />

  <rect x="64" y="284" width="1152" height="176" class="lane" />
  <text x="88" y="318" class="lane-title">召回层：两条路径并行理解问题</text>
  <rect x="174" y="348" width="260" height="72" class="dense" />
  <text x="234" y="378" class="box-title">Dense Search</text>
  <text x="206" y="402" class="box-body">Ollama embedding + Qdrant</text>
  <rect x="846" y="348" width="260" height="72" class="keyword" />
  <text x="912" y="378" class="box-title">Keyword Search</text>
  <text x="878" y="402" class="box-body">.rag/keyword_index.json</text>
  <path d="M860 218 C760 260 548 300 390 348" class="line" />
  <path d="M860 218 C930 262 972 300 976 348" class="line" />

  <rect x="64" y="502" width="1152" height="104" class="lane" />
  <text x="88" y="536" class="lane-title">融合层：只比较排名，不比较不同体系的原始分数</text>
  <rect x="524" y="530" width="232" height="56" class="fusion" />
  <text x="574" y="562" class="box-title">RRF Fusion</text>
  <path d="M434 384 C492 416 560 482 612 530" class="line" />
  <path d="M846 384 C790 416 720 482 668 530" class="line" />

  <rect x="64" y="648" width="1152" height="72" class="lane" />
  <rect x="354" y="656" width="260" height="48" class="output" />
  <text x="400" y="687" class="box-title">SearchHit JSON</text>
  <rect x="666" y="656" width="260" height="48" class="output" />
  <text x="700" y="687" class="box-title">Ask JSON Answer</text>
  <path d="M640 586 C610 622 544 632 484 656" class="line" />
  <path d="M640 586 C680 622 742 632 796 656" class="line" />
</svg>
