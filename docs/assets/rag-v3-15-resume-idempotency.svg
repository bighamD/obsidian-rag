<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="820" viewBox="0 0 1440 820" role="img" aria-labelledby="title desc">
  <title id="title">V3.15 恢复执行与 Tool 幂等保护</title>
  <desc id="desc">展示节点重放时如何通过幂等键复用已完成副作用工具结果，避免重复写文件。</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#07162f"/><stop offset="1" stop-color="#132a50"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity=".35"/></filter><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#6cb6ff"/></marker><style>.t{font:700 34px system-ui;fill:#f6f9ff}.sub{font:16px system-ui;fill:#a9bddb}.c{fill:#122a4a;stroke:#315984;stroke-width:1.5;rx:14;filter:url(#s)}.g{fill:#123c38;stroke:#48c7a0}.y{fill:#44351b;stroke:#e8bd55}.h{font:700 18px system-ui;fill:#fff}.p{font:14px system-ui;fill:#bed0e8}.tag{font:700 12px system-ui;fill:#ffe08a}.l{stroke:#6cb6ff;stroke-width:3;fill:none;marker-end:url(#a)}.bad{stroke:#ef7777;stroke-width:3;fill:none;marker-end:url(#a)}</style></defs>
  <rect width="1440" height="820" fill="url(#bg)"/>
  <text class="t" x="70" y="72">Checkpoint 能恢复，不代表副作用天然不会重复</text><text class="sub" x="70" y="104">幂等保护解决“节点重放时 Tool 是否再次执行”的问题</text>
  <rect class="c" x="80" y="180" width="230" height="120"/><text class="h" x="108" y="225">execute_steps</text><text class="p" x="108" y="255">准备执行 write_file</text><text class="p" x="108" y="280">step_id = s2</text>
  <rect class="c y" x="380" y="160" width="290" height="160"/><text class="h" x="412" y="208">生成 idempotency_key</text><text class="p" x="412" y="240">SHA-256(run_id, step_id,</text><text class="p" x="412" y="266">tool_name, arguments)</text><text class="tag" x="412" y="294">同一动作得到稳定 key</text>
  <rect class="c" x="750" y="180" width="250" height="120"/><text class="h" x="780" y="225">查询 PostgreSQL</text><text class="p" x="780" y="255">hitl_tool_results</text><text class="p" x="780" y="280">唯一键是否已存在?</text>
  <path class="l" d="M310 240H380"/><path class="l" d="M670 240H750"/>
  <rect class="c g" x="1080" y="130" width="260" height="150"/><text class="h" x="1110" y="178">命中缓存</text><text class="p" x="1110" y="210">返回原 StepResult</text><text class="p" x="1110" y="236">idempotency_hit = true</text><text class="tag" x="1110" y="262">不重复执行 Tool</text>
  <rect class="c" x="1080" y="380" width="260" height="170"/><text class="h" x="1110" y="428">未命中缓存</text><text class="p" x="1110" y="460">进入 Sandbox Tool</text><text class="p" x="1110" y="486">成功后保存 StepResult</text><text class="p" x="1110" y="512">失败不缓存，可再次恢复</text>
  <path class="l" d="M1000 220H1080"/><text class="tag" x="1018" y="202">YES</text><path class="l" d="M875 300V465H1080"/><text class="tag" x="892" y="350">NO</text>
  <rect class="c" x="700" y="610" width="640" height="110"/><text class="h" x="730" y="654">V3.15 当前保证</text><text class="p" x="730" y="684">同一 Run 的成功副作用 Tool 在节点重放时不会重复执行。</text><text class="p" x="730" y="708">跨 Run 的业务幂等仍需业务主键、数据库唯一约束或外部系统幂等 API。</text>
  <rect class="c" x="80" y="420" width="500" height="180"/><text class="h" x="110" y="466">为什么仅靠 Checkpoint 不够？</text><text class="p" x="110" y="500">节点可能在 Tool 成功后、Checkpoint 写入前崩溃。</text><text class="p" x="110" y="530">恢复时节点会重放，文件写入或外部请求可能再次发生。</text><path class="bad" d="M330 600V675H650"/><text class="tag" x="350" y="640">副作用重复风险</text>
</svg>
