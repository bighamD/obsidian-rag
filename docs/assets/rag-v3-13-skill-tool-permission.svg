<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">V3.13 Skill、Tool 与 Permission 的职责关系</title>
  <desc id="desc">展示 Skill Router 在 Planner 前提供方法，Tool Catalog 提供能力，Permission Policy 在执行前授权。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#081b33"/><stop offset="1" stop-color="#123657"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#020c18" flood-opacity=".35"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0L12 6L0 12Z" fill="#66d4ff"/></marker>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="90" y="95" fill="#f4f8fc" font-size="42" font-family="Arial, sans-serif" font-weight="700">Skill、Tool、Permission 各管一件事</text>
  <text x="90" y="140" fill="#a9c2d8" font-size="22" font-family="Arial, sans-serif">方法先进入 Planner，执行动作随后接受授权</text>

  <g filter="url(#shadow)">
    <rect x="90" y="230" width="390" height="360" rx="22" fill="#102f4c" stroke="#55b8ff" stroke-width="2"/>
    <rect x="605" y="230" width="390" height="360" rx="22" fill="#103d3b" stroke="#55d8b0" stroke-width="2"/>
    <rect x="1120" y="230" width="390" height="360" rx="22" fill="#392f52" stroke="#d0a8ff" stroke-width="2"/>
  </g>

  <text x="130" y="295" fill="#78cbff" font-size="30" font-family="Arial, sans-serif" font-weight="700">Skill</text>
  <text x="130" y="345" fill="#f3f7fb" font-size="23" font-family="Arial, sans-serif">告诉 Planner 如何完成任务</text>
  <text x="130" y="405" fill="#b8ccdc" font-size="20" font-family="Arial, sans-serif">• 发现 Skill manifests</text>
  <text x="130" y="445" fill="#b8ccdc" font-size="20" font-family="Arial, sans-serif">• LLM 选择零个或一个</text>
  <text x="130" y="485" fill="#b8ccdc" font-size="20" font-family="Arial, sans-serif">• 选中后加载 SKILL.md</text>
  <text x="130" y="535" fill="#ffd66b" font-size="18" font-family="Arial, sans-serif">不执行 scripts，不等于 Tool</text>

  <text x="645" y="295" fill="#72e1bb" font-size="30" font-family="Arial, sans-serif" font-weight="700">Tool</text>
  <text x="645" y="345" fill="#f3f7fb" font-size="23" font-family="Arial, sans-serif">提供可以执行的具体能力</text>
  <text x="645" y="405" fill="#c1d9d2" font-size="20" font-family="Arial, sans-serif">• search_notes 固定内建</text>
  <text x="645" y="445" fill="#c1d9d2" font-size="20" font-family="Arial, sans-serif">• MCP Tool 运行时发现</text>
  <text x="645" y="485" fill="#c1d9d2" font-size="20" font-family="Arial, sans-serif">• Planner 生成 PlanStep</text>
  <text x="645" y="535" fill="#ffd66b" font-size="18" font-family="Arial, sans-serif">被规划不代表允许执行</text>

  <text x="1160" y="295" fill="#d6b7ff" font-size="30" font-family="Arial, sans-serif" font-weight="700">Permission</text>
  <text x="1160" y="345" fill="#f3f7fb" font-size="23" font-family="Arial, sans-serif">决定 PlanStep 能否执行</text>
  <text x="1160" y="405" fill="#d8cce8" font-size="20" font-family="Arial, sans-serif">• allowlist 与 permission</text>
  <text x="1160" y="445" fill="#d8cce8" font-size="20" font-family="Arial, sans-serif">• Collection scope 与 Schema</text>
  <text x="1160" y="485" fill="#d8cce8" font-size="20" font-family="Arial, sans-serif">• allow / confirm / deny</text>
  <text x="1160" y="535" fill="#ffd66b" font-size="18" font-family="Arial, sans-serif">位于 Planner 后、Executor 前</text>

  <path d="M480 410H590" stroke="#66d4ff" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M995 410H1105" stroke="#66d4ff" stroke-width="5" marker-end="url(#arrow)"/>
  <rect x="250" y="690" width="1100" height="105" rx="18" fill="#0c253e" stroke="#2e668c"/>
  <text x="800" y="735" text-anchor="middle" fill="#f3f7fb" font-size="25" font-family="Arial, sans-serif" font-weight="700">最终链路</text>
  <text x="800" y="775" text-anchor="middle" fill="#a9cce2" font-size="21" font-family="Arial, sans-serif">Skill Context → Planner → PlanStep → PermissionDecision → Tool Executor</text>
</svg>
