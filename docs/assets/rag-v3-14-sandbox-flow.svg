<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">V3.14 Docker Sandbox 端到端流程</title><desc id="desc">展示 Planner、Permission、Sandbox Executor、Docker Container 和 Artifact Registry 的执行顺序。</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#071a32"/><stop offset="1" stop-color="#123a59"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="9" stdDeviation="10" flood-opacity=".35"/></filter><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0V6L9 3Z" fill="#68c8ff"/></marker></defs>
  <rect width="1600" height="900" fill="url(#bg)"/><text x="80" y="85" fill="#f5f9fc" font-size="40" font-family="Arial" font-weight="700">V3.14：动作离开 Agent 前，先进入隔离边界</text><text x="80" y="128" fill="#aac3d8" font-size="21" font-family="Arial">Docker 不可用时 fail closed，不退化成宿主机 Shell</text>
  <g filter="url(#s)" font-family="Arial">
    <rect x="80" y="230" width="230" height="140" rx="16" fill="#143d60" stroke="#59baff"/><text x="110" y="275" fill="#7fcaff" font-size="15" font-weight="700">01 PLAN</text><text x="110" y="315" fill="#fff" font-size="26" font-weight="700">Planner</text><text x="110" y="345" fill="#bfd0df" font-size="17">生成 sandbox Tool step</text>
    <rect x="385" y="230" width="230" height="140" rx="16" fill="#3c315a" stroke="#b396ff"/><text x="415" y="275" fill="#cebaff" font-size="15" font-weight="700">02 POLICY</text><text x="415" y="315" fill="#fff" font-size="26" font-weight="700">Permission</text><text x="415" y="345" fill="#d8cde9" font-size="17">权限、Schema、risk</text>
    <rect x="690" y="230" width="230" height="140" rx="16" fill="#133f42" stroke="#5bd5b6"/><text x="720" y="275" fill="#78e2c4" font-size="15" font-weight="700">03 EXECUTE</text><text x="720" y="315" fill="#fff" font-size="26" font-weight="700">SandboxRuntime</text><text x="720" y="345" fill="#c3dcd7" font-size="17">Workspace + Path Guard</text>
    <rect x="995" y="210" width="250" height="180" rx="16" fill="#174c66" stroke="#62d1ff" stroke-width="2"/><text x="1025" y="258" fill="#84ddff" font-size="15" font-weight="700">04 ISOLATION</text><text x="1025" y="300" fill="#fff" font-size="26" font-weight="700">Docker Container</text><text x="1025" y="335" fill="#c4d9e4" font-size="16">network=none · read-only</text><text x="1025" y="362" fill="#c4d9e4" font-size="16">CPU · memory · PIDs · timeout</text>
    <rect x="1320" y="230" width="210" height="140" rx="16" fill="#473919" stroke="#f0c25d"/><text x="1350" y="275" fill="#ffd779" font-size="15" font-weight="700">05 OUTPUT</text><text x="1350" y="315" fill="#fff" font-size="25" font-weight="700">Artifacts</text><text x="1350" y="345" fill="#e4d6b4" font-size="16">hash · MIME · download</text>
  </g>
  <g stroke="#68c8ff" stroke-width="4" fill="none" marker-end="url(#a)"><path d="M310 300H375"/><path d="M615 300H680"/><path d="M920 300H985"/><path d="M1245 300H1310"/></g>
  <rect x="180" y="545" width="1240" height="190" rx="18" fill="#0c263e" stroke="#376789"/><text x="220" y="595" fill="#8cccf4" font-size="16" font-family="Arial" font-weight="700">FULL AGENT PATH</text><text x="220" y="645" fill="#f4f8fb" font-size="23" font-family="Arial">Skill → Planner → Collection → Permission → Sandbox → Evidence → Context → Answer → Memory</text><text x="220" y="690" fill="#aec4d5" font-size="18" font-family="Arial">Tool Observation 返回 stdout / stderr / exit code；文件通过 ArtifactRecord 返回，不暴露任意宿主机路径。</text>
</svg>
