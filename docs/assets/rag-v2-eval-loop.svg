<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">V2 Evaluation Loop</title>
  <desc id="desc">从评估集开始，调用检索服务，计算指标，保存报告，再根据指标调整 RAG 参数。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#0f766e" />
    </marker>
    <style>
      .title { font: 700 32px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .subtitle { font: 500 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
      .box-title { font: 700 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .box-body { font: 500 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .line { stroke: #0f766e; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .box { fill: #ecfeff; stroke: #06b6d4; stroke-width: 2; rx: 18; }
      .report { fill: #f5f3ff; stroke: #8b5cf6; stroke-width: 2; rx: 18; }
      .adjust { fill: #fff7ed; stroke: #fb923c; stroke-width: 2; rx: 18; }
    </style>
  </defs>
  <rect width="1280" height="760" fill="#ffffff" />
  <text x="64" y="64" class="title">V2 Evaluation Loop</text>
  <text x="64" y="96" class="subtitle">把“试一下感觉不错”变成“用同一批问题反复测”。</text>

  <rect x="92" y="180" width="250" height="104" class="box" />
  <text x="142" y="220" class="box-title">Eval Set YAML</text>
  <text x="124" y="250" class="box-body">问题 + 预期来源 + 要点</text>

  <path d="M342 232 H458" class="line" />
  <rect x="458" y="180" width="250" height="104" class="box" />
  <text x="508" y="220" class="box-title">Retrieval Service</text>
  <text x="514" y="250" class="box-body">dense / keyword / hybrid</text>

  <path d="M708 232 H824" class="line" />
  <rect x="824" y="180" width="250" height="104" class="box" />
  <text x="884" y="220" class="box-title">Metrics</text>
  <text x="860" y="250" class="box-body">hit rate、MRR、recall</text>

  <path d="M949 284 V394" class="line" />
  <rect x="824" y="394" width="250" height="104" class="report" />
  <text x="884" y="434" class="box-title">JSON Report</text>
  <text x="858" y="464" class="box-body">保存到 .rag/eval/*.json</text>

  <path d="M824 446 H708" class="line" />
  <rect x="458" y="394" width="250" height="104" class="adjust" />
  <text x="532" y="434" class="box-title">Compare</text>
  <text x="492" y="464" class="box-body">对比不同配置的报告</text>

  <path d="M458 446 H342" class="line" />
  <rect x="92" y="394" width="250" height="104" class="adjust" />
  <text x="146" y="434" class="box-title">Tune RAG</text>
  <text x="122" y="464" class="box-body">chunk size / mode / model</text>

  <path d="M217 394 C140 338 140 294 217 284" class="line" />

  <rect x="150" y="600" width="980" height="70" class="report" />
  <text x="190" y="642" class="box-body">CLI：obsidian-rag eval retrieval eval_sets/retrieval-food-safety.yaml --top-k 5 --mode hybrid</text>
</svg>
