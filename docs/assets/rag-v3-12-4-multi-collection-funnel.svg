<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">V3.12.4 多 Collection 候选与 Reranker 漏斗</title>
  <desc id="desc">展示两个知识库各自召回候选，跨库融合后统一进入 CrossEncoder Reranker，最终只把全局 Top K 送入 Context。</desc>
  <defs><linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#07182b"/><stop offset="1" stop-color="#12263d"/></linearGradient><filter id="sh"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity=".25"/></filter><marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#75d2ff"/></marker></defs>
  <rect width="1200" height="760" fill="url(#bg3)"/>
  <text x="600" y="62" text-anchor="middle" fill="#f4f8ff" font-size="34" font-weight="700">多库检索不是把两个 Top K 简单拼起来</text>
  <text x="600" y="96" text-anchor="middle" fill="#a9dfff" font-size="17">扩大召回 → 标记 Collection → 全局重排 → Context Top K</text>
  <g filter="url(#sh)" font-family="Arial, sans-serif">
    <rect x="75" y="160" width="280" height="180" rx="14" fill="#183654" stroke="#34bfff" stroke-width="2"/><text x="215" y="203" text-anchor="middle" fill="#fff" font-size="23" font-weight="700">food_safety</text><text x="215" y="241" text-anchor="middle" fill="#c9def1" font-size="16">Hybrid/RRF Recall</text><text x="215" y="284" text-anchor="middle" fill="#ffd166" font-size="28" font-weight="700">15</text><text x="215" y="312" text-anchor="middle" fill="#c9def1" font-size="13">candidates</text>
    <rect x="75" y="420" width="280" height="180" rx="14" fill="#183654" stroke="#34bfff" stroke-width="2"/><text x="215" y="463" text-anchor="middle" fill="#fff" font-size="23" font-weight="700">recipes</text><text x="215" y="501" text-anchor="middle" fill="#c9def1" font-size="16">Hybrid/RRF Recall</text><text x="215" y="544" text-anchor="middle" fill="#ffd166" font-size="28" font-weight="700">15</text><text x="215" y="572" text-anchor="middle" fill="#c9def1" font-size="13">candidates</text>
    <rect x="455" y="250" width="290" height="260" rx="14" fill="#3b356a" stroke="#9a84ff" stroke-width="2"/><text x="600" y="298" text-anchor="middle" fill="#fff" font-size="23" font-weight="700">Cross-Collection Pool</text><text x="600" y="338" text-anchor="middle" fill="#ded8ff" font-size="15">保留 collection / rank / score</text><text x="600" y="400" text-anchor="middle" fill="#ffd166" font-size="38" font-weight="700">30</text><text x="600" y="435" text-anchor="middle" fill="#ded8ff" font-size="14">global candidates</text><text x="600" y="473" text-anchor="middle" fill="#ded8ff" font-size="14">不是最终答案上下文</text>
    <rect x="845" y="250" width="280" height="260" rx="14" fill="#15463e" stroke="#3fd0a2" stroke-width="2"/><text x="985" y="298" text-anchor="middle" fill="#fff" font-size="23" font-weight="700">Global Reranker</text><text x="985" y="338" text-anchor="middle" fill="#c9e9df" font-size="15">query-document relevance</text><text x="985" y="400" text-anchor="middle" fill="#ffd166" font-size="38" font-weight="700">5</text><text x="985" y="435" text-anchor="middle" fill="#c9e9df" font-size="14">Context Top K</text><text x="985" y="473" text-anchor="middle" fill="#c9e9df" font-size="14">跨库统一排序</text>
    <path d="M355 250 C405 250 405 320 455 320" fill="none" stroke="#75d2ff" stroke-width="3" marker-end="url(#a)"/><path d="M355 510 C405 510 405 440 455 440" fill="none" stroke="#75d2ff" stroke-width="3" marker-end="url(#a)"/><path d="M745 380 H845" stroke="#75d2ff" stroke-width="3" marker-end="url(#a)"/>
  </g>
  <rect x="250" y="650" width="700" height="55" rx="10" fill="#102b45" stroke="#5ec9ff"/>
  <text x="600" y="684" text-anchor="middle" fill="#d9e8f6" font-size="16">某个 Collection 局部失败时记录 errors；其他库仍可继续，Reranker fail-open 保留候选顺序</text>
</svg>
