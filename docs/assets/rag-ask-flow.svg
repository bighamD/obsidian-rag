<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="620" viewBox="0 0 1180 620" role="img" aria-labelledby="title desc">
  <title id="title">RAG ask flow</title>
  <desc id="desc">The ask flow receives a user question, retrieves relevant chunks from the vector store, builds grounded prompt messages, calls the LLM, and returns an answer with sources.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="1180" height="620" fill="#f8fafc"/>
  <text x="590" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">提问阶段：search / ask</text>
  <text x="590" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#475569">在线执行：先检索证据，再把证据交给 LLM 生成有来源的回答</text>

  <rect x="48" y="122" width="238" height="340" rx="8" fill="#ffffff" stroke="#bfdbfe" stroke-width="2"/>
  <rect x="48" y="122" width="238" height="54" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>
  <text x="167" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#1d4ed8">输入</text>
  <text x="76" y="218" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">Question</text>
  <text x="76" y="252" font-family="Arial, sans-serif" font-size="14" fill="#334155">用户问题</text>
  <text x="76" y="282" font-family="Arial, sans-serif" font-size="14" fill="#334155">top_k</text>
  <text x="76" y="312" font-family="Arial, sans-serif" font-size="14" fill="#334155">检索配置</text>
  <text x="76" y="354" font-family="Arial, sans-serif" font-size="13" fill="#64748b">命令：`search` 或 `ask`</text>

  <rect x="356" y="122" width="468" height="340" rx="8" fill="#ffffff" stroke="#bbf7d0" stroke-width="2"/>
  <rect x="356" y="122" width="468" height="54" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="2"/>
  <text x="590" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#047857">Runtime Pipeline</text>
  <circle cx="418" cy="230" r="22" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="418" y="237" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#166534">1</text>
  <rect x="456" y="198" width="300" height="64" rx="8" fill="#ffffff" stroke="#86efac" stroke-width="2"/>
  <text x="480" y="224" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#166534">search</text>
  <text x="480" y="248" font-family="Arial, sans-serif" font-size="13" fill="#475569">query embedding -> Qdrant top-k</text>
  <circle cx="418" cy="320" r="22" fill="#fef9c3" stroke="#eab308" stroke-width="2"/>
  <text x="418" y="327" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#854d0e">2</text>
  <rect x="456" y="288" width="300" height="64" rx="8" fill="#ffffff" stroke="#fde047" stroke-width="2"/>
  <text x="480" y="314" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#854d0e">build prompt</text>
  <text x="480" y="338" font-family="Arial, sans-serif" font-size="13" fill="#475569">把 chunks 变成 grounded messages</text>
  <circle cx="418" cy="410" r="22" fill="#ffedd5" stroke="#fb923c" stroke-width="2"/>
  <text x="418" y="417" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#9a3412">3</text>
  <rect x="456" y="378" width="300" height="64" rx="8" fill="#ffffff" stroke="#fdba74" stroke-width="2"/>
  <text x="480" y="404" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#9a3412">LLM answer</text>
  <text x="480" y="428" font-family="Arial, sans-serif" font-size="13" fill="#475569">只基于资料回答并列来源</text>
  <path d="M418 252 L418 292" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M418 342 L418 382" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <rect x="894" y="122" width="238" height="340" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <rect x="894" y="122" width="238" height="54" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
  <text x="1013" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#334155">输出</text>
  <text x="922" y="218" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">AskResponse</text>
  <text x="922" y="252" font-family="Arial, sans-serif" font-size="14" fill="#334155">answer</text>
  <text x="922" y="282" font-family="Arial, sans-serif" font-size="14" fill="#334155">results</text>
  <text x="922" y="312" font-family="Arial, sans-serif" font-size="14" fill="#334155">sources</text>
  <text x="922" y="354" font-family="Arial, sans-serif" font-size="13" fill="#64748b">`search` 只输出 results</text>
  <text x="922" y="382" font-family="Arial, sans-serif" font-size="13" fill="#64748b">`ask` 输出 answer + sources</text>
  <path d="M286 292 L356 292" stroke="#475569" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M824 292 L894 292" stroke="#475569" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>

  <rect x="156" y="510" width="868" height="64" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="2"/>
  <text x="590" y="538" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#991b1b">ask 边界</text>
  <text x="590" y="562" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#475569">v0 不做意图判断、不做工具选择；问题一定进入固定检索和回答流程</text>
</svg>
