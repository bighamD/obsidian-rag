<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="740" viewBox="0 0 1180 740">
  <rect width="1180" height="740" fill="#f8fafc"/>
  <text x="590" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#0f172a">V3.8 Conversation Memory 流程</text>
  <text x="590" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#475569">SQLite 保存完整原始 turns，当前 run 只读取最近 memory_window 轮</text>

  <rect x="48" y="122" width="272" height="456" rx="12" fill="#ffffff" stroke="#93c5fd" stroke-width="2"/>
  <text x="184" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#1d4ed8">输入与存储</text>
  <rect x="76" y="190" width="216" height="82" rx="10" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="184" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#1e3a8a">AgentAskRequest</text>
  <text x="184" y="247" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">question / conversation_id</text>
  <rect x="76" y="308" width="216" height="112" rx="10" fill="#f0fdf4" stroke="#86efac"/>
  <text x="184" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#166534">SQLite Memory Store</text>
  <text x="184" y="369" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#166534">conversations</text>
  <text x="184" y="393" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#166534">turns: question / answer</text>
  <rect x="76" y="458" width="216" height="78" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="184" y="489" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#334155">MemorySnapshot</text>
  <text x="184" y="514" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#475569">最近 N 轮 + omitted count</text>

  <rect x="358" y="122" width="480" height="456" rx="12" fill="#ffffff" stroke="#5eead4" stroke-width="2"/>
  <text x="598" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#0f766e">LangGraph 主流程</text>
  <g font-family="Arial, sans-serif">
    <rect x="408" y="184" width="380" height="44" rx="8" fill="#f0fdf4" stroke="#86efac"/>
    <text x="598" y="212" text-anchor="middle" font-size="15" font-weight="700" fill="#166534">1. load_memory</text>
    <path d="M598 231 L598 251" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="408" y="254" width="380" height="44" rx="8" fill="#ecfeff" stroke="#99f6e4"/>
    <text x="598" y="282" text-anchor="middle" font-size="15" font-weight="700" fill="#115e59">2. planner 使用最近历史理解指代</text>
    <path d="M598 301 L598 321" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="408" y="324" width="380" height="44" rx="8" fill="#ecfeff" stroke="#99f6e4"/>
    <text x="598" y="352" text-anchor="middle" font-size="15" font-weight="700" fill="#115e59">3. execute / evidence / retry</text>
    <path d="M598 371 L598 391" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="408" y="394" width="380" height="52" rx="8" fill="#fefce8" stroke="#fde68a"/>
    <text x="598" y="426" text-anchor="middle" font-size="15" font-weight="700" fill="#854d0e">4. build_context 加入 MemorySnapshot</text>
    <path d="M598 449 L598 469" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="408" y="472" width="380" height="44" rx="8" fill="#faf5ff" stroke="#ddd6fe"/>
    <text x="598" y="500" text-anchor="middle" font-size="15" font-weight="700" fill="#6d28d9">5. synthesize_answer</text>
    <path d="M598 519 L598 539" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="408" y="542" width="380" height="44" rx="8" fill="#f0fdf4" stroke="#86efac"/>
    <text x="598" y="570" text-anchor="middle" font-size="15" font-weight="700" fill="#166534">6. save_memory 保存本轮原文</text>
  </g>

  <rect x="876" y="122" width="256" height="456" rx="12" fill="#ffffff" stroke="#c4b5fd" stroke-width="2"/>
  <text x="1004" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#6d28d9">输出</text>
  <rect x="902" y="192" width="204" height="78" rx="10" fill="#faf5ff" stroke="#ddd6fe"/>
  <text x="1004" y="223" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#581c87">conversation_id</text>
  <text x="1004" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#475569">下一轮继续复用</text>
  <rect x="902" y="308" width="204" height="90" rx="10" fill="#faf5ff" stroke="#ddd6fe"/>
  <text x="1004" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#581c87">memory_snapshot</text>
  <text x="1004" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#475569">loaded / total / omitted</text>
  <rect x="902" y="438" width="204" height="90" rx="10" fill="#faf5ff" stroke="#ddd6fe"/>
  <text x="1004" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#581c87">memory_write</text>
  <text x="1004" y="495" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#475569">turn_id / saved</text>

  <path d="M320 350 L358 350" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M838 350 L876 350" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="48" y="616" width="1084" height="78" rx="12" fill="#fff7ed" stroke="#fdba74"/>
  <text x="590" y="647" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#9a3412">版本边界</text>
  <text x="590" y="675" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#7c2d12">V3.8 保存完整原始 turns，但只注入最近窗口；不做 LLM 摘要、rolling summary、向量 Memory 或用户画像。</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
