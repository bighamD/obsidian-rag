<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">V3.16 ToolMessage 驱动 Markdown 写入</title>
  <desc id="desc">展示用户消息、search_notes Tool Call、结构化 ToolMessage、下一次模型调用以及 write_file 参数之间的数据传递。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#071426"/><stop offset="1" stop-color="#102a43"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="5" stdDeviation="7" flood-opacity=".28"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#7dd3fc"/></marker>
    <style>
      .title{font:700 28px system-ui;fill:#f8fafc}.sub{font:15px system-ui;fill:#bae6fd}.box{rx:15;fill:#132f4c;stroke:#38bdf8;stroke-width:2;filter:url(#shadow)}
      .good{fill:#123d34;stroke:#34d399}.purple{fill:#2b2146;stroke:#c084fc}.warn{fill:#422006;stroke:#fbbf24}.text{font:650 17px system-ui;fill:#f8fafc}.small{font:13px system-ui;fill:#cbd5e1}.code{font:12px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#dbeafe}.note{font:13px system-ui;fill:#a7f3d0}
      .line{stroke:#7dd3fc;stroke-width:2.5;fill:none;marker-end:url(#arrow)}.dash{stroke:#fbbf24;stroke-width:2;stroke-dasharray:7 7;fill:none}
    </style>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <text x="600" y="48" text-anchor="middle" class="title">ToolMessage 是下一次模型调用的事实输入</text>
  <text x="600" y="77" text-anchor="middle" class="sub">不是用答案反推来源，也不是 Planner 预制正文，而是标准 messages 数据流</text>

  <rect x="60" y="125" width="250" height="104" class="box"/>
  <text x="185" y="158" text-anchor="middle" class="text">HumanMessage</text>
  <text x="185" y="185" text-anchor="middle" class="small">麻婆豆腐的做法总结成</text>
  <text x="185" y="207" text-anchor="middle" class="small">.md 文档发给我</text>

  <rect x="365" y="125" width="250" height="104" class="box purple"/>
  <text x="490" y="158" text-anchor="middle" class="text">AIMessage #1</text>
  <text x="490" y="185" text-anchor="middle" class="small">tool_call: search_notes</text>
  <text x="490" y="207" text-anchor="middle" class="small">query: 麻婆豆腐 做法</text>

  <rect x="670" y="125" width="250" height="104" class="box good"/>
  <text x="795" y="158" text-anchor="middle" class="text">search_notes</text>
  <text x="795" y="185" text-anchor="middle" class="small">Hybrid / RRF / optional Rerank</text>
  <text x="795" y="207" text-anchor="middle" class="small">返回真实知识库 chunks</text>

  <path d="M310 177 L365 177" class="line"/>
  <path d="M615 177 L670 177" class="line"/>

  <rect x="150" y="295" width="900" height="192" class="box good"/>
  <text x="600" y="330" text-anchor="middle" class="text">ToolMessage(name="search_notes", tool_call_id="call_search_1")</text>
  <text x="190" y="365" class="code">{</text>
  <text x="215" y="389" class="code">"status": "success", "result_count": 5,</text>
  <text x="215" y="413" class="code">"selected_collections": ["recipes"],</text>
  <text x="215" y="437" class="code">"results": [{"chunk_id": "KB-...", "source": "...",</text>
  <text x="330" y="461" class="code">"content": "麻婆豆腐步骤...", "score": 0.03, "collection": "recipes"}]</text>
  <text x="190" y="477" class="code">}</text>
  <path d="M795 229 C795 270 720 270 720 295" class="line"/>

  <rect x="150" y="555" width="385" height="150" class="box purple"/>
  <text x="342" y="591" text-anchor="middle" class="text">AIMessage #2</text>
  <text x="342" y="619" text-anchor="middle" class="small">读取完整 messages，包括上面的 ToolMessage</text>
  <text x="342" y="647" text-anchor="middle" class="small">组织步骤、注意事项和来源章节</text>
  <text x="342" y="677" text-anchor="middle" class="note">此时才生成最终 Markdown 正文</text>

  <rect x="665" y="555" width="385" height="150" class="box warn"/>
  <text x="857" y="591" text-anchor="middle" class="text">write_file Tool Call</text>
  <text x="700" y="621" class="code">file_path: "/artifacts/mapo-tofu.md"</text>
  <text x="700" y="647" class="code">content: "# 麻婆豆腐\n...\n## 使用到的来源"</text>
  <text x="700" y="677" class="code">          "KB-...：..."</text>
  <path d="M535 630 L665 630" class="line"/>
  <path d="M600 487 L342 555" class="line"/>

  <path d="M615 245 L615 275 L1050 275" class="dash"/>
  <text x="832" y="267" text-anchor="middle" class="small">禁止同一 AIMessage 同时预制 search_notes + write_file</text>

  <rect x="330" y="744" width="540" height="34" rx="17" fill="#173b51" stroke="#34d399"/>
  <text x="600" y="766" text-anchor="middle" class="note">验证点：write_file.arguments.content 能在 ToolMessage 中找到对应事实与来源</text>
</svg>
