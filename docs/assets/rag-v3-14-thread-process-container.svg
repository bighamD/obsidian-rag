<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">线程、子进程与容器的隔离区别</title><desc id="desc">对比 Thread、Process 和 Docker Container 在 V3.14 中的职责与隔离能力。</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#071a32"/><stop offset="1" stop-color="#16324f"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="9" stdDeviation="11" flood-opacity=".36"/></filter></defs><rect width="1600" height="900" fill="url(#bg)"/>
  <text x="85" y="90" fill="#f5f9fc" font-size="42" font-family="Arial" font-weight="700">不是开个线程，就叫 Sandbox</text><text x="85" y="135" fill="#abc4d9" font-size="22" font-family="Arial">并发、进程启动与安全隔离是三个不同问题</text>
  <g filter="url(#s)" font-family="Arial">
    <rect x="85" y="235" width="420" height="410" rx="20" fill="#153b5b" stroke="#55b7fa"/><text x="125" y="300" fill="#78c9ff" font-size="31" font-weight="700">Thread</text><text x="125" y="350" fill="#fff" font-size="23">用途：调度与避免阻塞</text><text x="125" y="415" fill="#bdd0df" font-size="19">共享进程内存</text><text x="125" y="455" fill="#bdd0df" font-size="19">共享环境变量</text><text x="125" y="495" fill="#bdd0df" font-size="19">共享宿主机文件权限</text><text x="125" y="565" fill="#ffae9d" font-size="20" font-weight="700">不提供安全隔离</text>
    <rect x="590" y="235" width="420" height="410" rx="20" fill="#173f3f" stroke="#55d5b3"/><text x="630" y="300" fill="#76e0c0" font-size="31" font-weight="700">Process</text><text x="630" y="350" fill="#fff" font-size="23">用途：启动 docker CLI</text><text x="630" y="415" fill="#c1d9d4" font-size="19">独立 PID 与内存</text><text x="630" y="455" fill="#c1d9d4" font-size="19">仍可能继承用户权限</text><text x="630" y="495" fill="#c1d9d4" font-size="19">直接 subprocess 仍可读宿主机</text><text x="630" y="565" fill="#ffd36f" font-size="20" font-weight="700">单独使用仍不是 Sandbox</text>
    <rect x="1095" y="215" width="420" height="450" rx="20" fill="#3b3154" stroke="#c09aff" stroke-width="2"/><text x="1135" y="285" fill="#d2b7ff" font-size="31" font-weight="700">Container</text><text x="1135" y="340" fill="#fff" font-size="23">用途：真正的执行边界</text><text x="1135" y="405" fill="#d8cee6" font-size="19">独立文件系统视图</text><text x="1135" y="445" fill="#d8cee6" font-size="19">network=none</text><text x="1135" y="485" fill="#d8cee6" font-size="19">Capability 与资源限制</text><text x="1135" y="525" fill="#d8cee6" font-size="19">只挂载 /workspace</text><text x="1135" y="595" fill="#7de0bd" font-size="20" font-weight="700">V3.14 的隔离核心</text>
  </g>
  <text x="800" y="770" text-anchor="middle" fill="#f2f7fb" font-size="25" font-family="Arial" font-weight="700">FastAPI → 可选 Worker Thread → docker 子进程 → Container</text><text x="800" y="815" text-anchor="middle" fill="#a9c4d8" font-size="19" font-family="Arial">只有最后一层负责限制不可信代码能看到和能做的事情</text>
</svg>
