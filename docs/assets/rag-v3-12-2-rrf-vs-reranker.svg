<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">RRF 与 Reranker 分工对比</title>
  <desc id="desc">RRF 根据多路排名快速投票，Reranker 阅读 Query 和 Chunk 后进行语义复审。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#071426"/><stop offset="1" stop-color="#102a43"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="5" stdDeviation="7" flood-opacity=".28"/></filter>
    <style>
      .title{font:700 28px system-ui;fill:#f8fafc}.sub{font:15px system-ui;fill:#bae6fd}.panel{rx:20;fill:#132f4c;stroke-width:2;filter:url(#shadow)}
      .rrf{stroke:#38bdf8}.rerank{stroke:#34d399}.head{font:700 23px system-ui;fill:#f8fafc}.text{font:16px system-ui;fill:#e2e8f0}.muted{font:14px system-ui;fill:#94a3b8}
      .chip{rx:12;fill:#0b2038;stroke:#64748b}.score{font:650 15px ui-monospace,monospace;fill:#fbbf24}.arrow{font:700 32px system-ui;fill:#7dd3fc}
    </style>
  </defs>
  <rect width="1200" height="620" fill="url(#bg)"/>
  <text x="600" y="48" text-anchor="middle" class="title">RRF 与 Reranker：投票员 + 复审员</text>
  <text x="600" y="76" text-anchor="middle" class="sub">两者串联使用，不是互相替代</text>

  <rect x="70" y="115" width="460" height="430" class="panel rrf"/>
  <text x="300" y="158" text-anchor="middle" class="head">RRF：根据名次投票</text>
  <text x="105" y="198" class="text">Dense 排名</text><text x="335" y="198" class="text">Keyword 排名</text>
  <rect x="100" y="220" width="170" height="48" class="chip"/><text x="185" y="250" text-anchor="middle" class="text">A · rank 1</text>
  <rect x="330" y="220" width="170" height="48" class="chip"/><text x="415" y="250" text-anchor="middle" class="text">B · rank 1</text>
  <rect x="100" y="286" width="170" height="48" class="chip"/><text x="185" y="316" text-anchor="middle" class="text">B · rank 2</text>
  <rect x="330" y="286" width="170" height="48" class="chip"/><text x="415" y="316" text-anchor="middle" class="text">A · rank 5</text>
  <text x="300" y="376" text-anchor="middle" class="score">score = Σ 1 / (60 + rank)</text>
  <text x="300" y="419" text-anchor="middle" class="text">快速得到融合顺序：A、B、C…</text>
  <text x="300" y="461" text-anchor="middle" class="muted">不阅读文本内容 · 毫秒级 · 适合大候选池</text>
  <text x="300" y="500" text-anchor="middle" class="muted">输出：有限候选池</text>

  <text x="600" y="335" text-anchor="middle" class="arrow">→</text>

  <rect x="670" y="115" width="460" height="430" class="panel rerank"/>
  <text x="900" y="158" text-anchor="middle" class="head">Reranker：阅读后复审</text>
  <rect x="710" y="205" width="380" height="64" class="chip"/><text x="900" y="232" text-anchor="middle" class="text">Query：剩牛肉能冷藏 2～3 天吗？</text><text x="900" y="254" text-anchor="middle" class="muted">+</text>
  <rect x="710" y="287" width="380" height="64" class="chip"/><text x="900" y="314" text-anchor="middle" class="text">Chunk：熟剩菜冷藏建议 3～4 天</text><text x="900" y="338" text-anchor="middle" class="score">relevance = 8.72</text>
  <rect x="710" y="369" width="380" height="64" class="chip"/><text x="900" y="396" text-anchor="middle" class="text">Chunk：牛肉烹饪中心温度</text><text x="900" y="420" text-anchor="middle" class="score">relevance = 3.15</text>
  <text x="900" y="471" text-anchor="middle" class="muted">理解语义 · Transformer 推理 · 成本较高</text>
  <text x="900" y="510" text-anchor="middle" class="muted">输出：最终 Top K</text>
</svg>
