<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="850" viewBox="0 0 1400 850" role="img" aria-labelledby="title desc">
  <title id="title">V3.17 three memory paths</title>
  <desc id="desc">Three scenarios compare same-thread follow-up, cross-thread long-term memory, and context summarization.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#071426"/><stop offset="1" stop-color="#102a43"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="5" stdDeviation="7" flood-opacity=".28"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#7dd3fc"/></marker>
    <style>
      .title{font:700 30px system-ui;fill:#f8fafc}.sub{font:15px system-ui;fill:#bae6fd}.lane{rx:16;fill:#0e263d;stroke:#315b78;stroke-width:2}.box{rx:12;fill:#173550;stroke:#38bdf8;stroke-width:2;filter:url(#shadow)}
      .green{fill:#123d34;stroke:#34d399}.yellow{fill:#422006;stroke:#fbbf24}.purple{fill:#302052;stroke:#c084fc}.laneTitle{font:700 19px system-ui;fill:#f8fafc}.text{font:650 15px system-ui;fill:#f8fafc}.small{font:12px system-ui;fill:#cbd5e1}.line{stroke:#7dd3fc;stroke-width:2.3;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1400" height="850" fill="url(#bg)"/>
  <text x="700" y="48" text-anchor="middle" class="title">V3.17 三条最重要的 Memory 路径</text>
  <text x="700" y="77" text-anchor="middle" class="sub">同 Thread 看 Checkpoint，跨 Thread 看 Store，长 Context 看 Summary</text>

  <rect x="55" y="115" width="1290" height="190" class="lane"/>
  <text x="85" y="150" class="laneTitle">A. 同一个 Conversation 追问</text>
  <rect x="95" y="185" width="230" height="78" class="box"/><text x="210" y="216" text-anchor="middle" class="text">Run 1</text><text x="210" y="241" text-anchor="middle" class="small">conversation_id = C1</text>
  <rect x="430" y="185" width="260" height="78" class="box green"/><text x="560" y="216" text-anchor="middle" class="text">Checkpoint Thread T1</text><text x="560" y="241" text-anchor="middle" class="small">保存 messages</text>
  <rect x="795" y="185" width="230" height="78" class="box"/><text x="910" y="216" text-anchor="middle" class="text">Run 2</text><text x="910" y="241" text-anchor="middle" class="small">仍使用 C1 / T1</text>
  <rect x="1130" y="185" width="170" height="78" class="box green"/><text x="1215" y="216" text-anchor="middle" class="text">续聊成功</text><text x="1215" y="241" text-anchor="middle" class="small">run_id 不同</text>
  <path d="M325 224 L430 224" class="line"/><path d="M690 224 L795 224" class="line"/><path d="M1025 224 L1130 224" class="line"/>

  <rect x="55" y="335" width="1290" height="190" class="lane"/>
  <text x="85" y="370" class="laneTitle">B. 新 Conversation 读取用户长期 Memory</text>
  <rect x="95" y="405" width="230" height="78" class="box"/><text x="210" y="436" text-anchor="middle" class="text">Conversation C1</text><text x="210" y="461" text-anchor="middle" class="small">remember_user_fact</text>
  <rect x="430" y="405" width="260" height="78" class="box purple"/><text x="560" y="436" text-anchor="middle" class="text">User Store Namespace</text><text x="560" y="461" text-anchor="middle" class="small">tenant + assistant + user</text>
  <rect x="795" y="405" width="230" height="78" class="box"/><text x="910" y="436" text-anchor="middle" class="text">Conversation C2</text><text x="910" y="461" text-anchor="middle" class="small">新的 Checkpoint T2</text>
  <rect x="1130" y="405" width="170" height="78" class="box purple"/><text x="1215" y="436" text-anchor="middle" class="text">偏好仍生效</text><text x="1215" y="461" text-anchor="middle" class="small">不复制 C1 历史</text>
  <path d="M325 444 L430 444" class="line"/><path d="M690 444 L795 444" class="line"/><path d="M1025 444 L1130 444" class="line"/>

  <rect x="55" y="555" width="1290" height="210" class="lane"/>
  <text x="85" y="590" class="laneTitle">C. Context 接近模型窗口</text>
  <rect x="95" y="625" width="230" height="88" class="box"/><text x="210" y="658" text-anchor="middle" class="text">原始 messages 增长</text><text x="210" y="685" text-anchor="middle" class="small">Checkpoint 仍保留日志</text>
  <rect x="430" y="625" width="260" height="88" class="box yellow"/><text x="560" y="658" text-anchor="middle" class="text">85% Profile Trigger</text><text x="560" y="685" text-anchor="middle" class="small">SummarizationMiddleware</text>
  <rect x="795" y="625" width="230" height="88" class="box yellow"/><text x="910" y="658" text-anchor="middle" class="text">旧历史 Offload</text><text x="910" y="685" text-anchor="middle" class="small">/context/history</text>
  <rect x="1130" y="625" width="170" height="88" class="box green"/><text x="1215" y="658" text-anchor="middle" class="text">继续模型调用</text><text x="1215" y="685" text-anchor="middle" class="small">Summary + 近期消息</text>
  <path d="M325 669 L430 669" class="line"/><path d="M690 669 L795 669" class="line"/><path d="M1025 669 L1130 669" class="line"/>

  <text x="700" y="815" text-anchor="middle" class="small">判断口诀：要不要恢复整段对话看 thread_id；要不要跨会话复用看 user namespace；会不会超窗口看 Summary trigger</text>
</svg>
