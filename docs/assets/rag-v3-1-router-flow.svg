<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="430" viewBox="0 0 1040 430" role="img" aria-labelledby="title desc">
  <title id="title">V3.1 LLM router flow</title>
  <desc id="desc">The user question goes to an LLM router. The router JSON decision chooses no search, clarify, or search notes.</desc>
  <rect width="1040" height="430" fill="#fbfcfe"/>
  <text x="520" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">V3.1 LLM Router 流程</text>

  <rect x="60" y="92" width="170" height="58" rx="8" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
  <text x="145" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#1e3a8a">用户问题</text>

  <path d="M230 121 L300 121" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="300" y="82" width="220" height="78" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="410" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#14532d">LLM Router</text>
  <text x="410" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#166534">只输出结构化 JSON</text>

  <path d="M520 121 L600 121" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="600" y="66" width="220" height="110" rx="8" fill="#fef9c3" stroke="#eab308" stroke-width="2"/>
  <text x="710" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#713f12">RouterDecision</text>
  <text x="710" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#713f12">action / intent</text>
  <text x="710" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#713f12">search_query / reason</text>
  <text x="710" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#713f12">direct_answer / clarify</text>

  <path d="M710 176 L710 226" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="602" y="226" width="216" height="50" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="710" y="257" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0f172a">按 action 分流</text>

  <path d="M602 251 L432 321" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M710 276 L710 321" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M818 251 L988 321" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="260" y="322" width="180" height="58" rx="8" fill="#fee2e2" stroke="#f87171" stroke-width="2"/>
  <text x="350" y="346" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#7f1d1d">no_search</text>
  <text x="350" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#991b1b">直接说明边界</text>

  <rect x="620" y="322" width="180" height="58" rx="8" fill="#ede9fe" stroke="#a78bfa" stroke-width="2"/>
  <text x="710" y="346" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#4c1d95">clarify</text>
  <text x="710" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5b21b6">向用户追问</text>

  <rect x="850" y="322" width="160" height="58" rx="8" fill="#e0f2fe" stroke="#38bdf8" stroke-width="2"/>
  <text x="930" y="346" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#075985">search</text>
  <text x="930" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0369a1">调用 search_notes</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
