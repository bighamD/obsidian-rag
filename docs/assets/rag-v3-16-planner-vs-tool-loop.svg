<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="780" viewBox="0 0 1200 780" role="img" aria-labelledby="title desc">
  <title id="title">V3.15 Planner Executor 与 V3.16 DeepAgents Tool Loop 对比</title>
  <desc id="desc">左侧展示 Planner 一次性生成全部参数的限制，右侧展示 DeepAgents 每次读取真实 ToolMessage 后再决定下一步。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#071426"/><stop offset="1" stop-color="#102a43"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="5" stdDeviation="7" flood-opacity=".28"/></filter>
    <marker id="blueArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#7dd3fc"/></marker>
    <marker id="greenArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#6ee7b7"/></marker>
    <style>
      .title{font:700 28px system-ui;fill:#f8fafc}.sub{font:15px system-ui;fill:#bae6fd}.lane{rx:18;fill:#0d2238;stroke:#36536d;stroke-width:1.5;filter:url(#shadow)}
      .box{rx:13;fill:#132f4c;stroke:#38bdf8;stroke-width:2}.good{fill:#123d34;stroke:#34d399}.warn{fill:#422006;stroke:#fbbf24}.muted{fill:#202d45;stroke:#8b9bb0}
      .heading{font:700 20px system-ui;fill:#f8fafc}.text{font:650 16px system-ui;fill:#f8fafc}.small{font:13px system-ui;fill:#cbd5e1}.bad{font:13px system-ui;fill:#fde68a}.ok{font:13px system-ui;fill:#a7f3d0}
      .line{stroke:#7dd3fc;stroke-width:2.5;fill:none;marker-end:url(#blueArrow)}.greenLine{stroke:#6ee7b7;stroke-width:2.5;fill:none;marker-end:url(#greenArrow)}
    </style>
  </defs>
  <rect width="1200" height="780" fill="url(#bg)"/>
  <text x="600" y="48" text-anchor="middle" class="title">从一次性 Plan 到 Observation 驱动的 Tool Loop</text>
  <text x="600" y="77" text-anchor="middle" class="sub">执行真相不再是预制的 PlanStep，而是 messages 中真实发生的 Tool Call 与 ToolMessage</text>

  <rect x="55" y="112" width="515" height="610" class="lane"/>
  <text x="312" y="151" text-anchor="middle" class="heading">V3.15 自研 Planner / Executor</text>
  <text x="312" y="177" text-anchor="middle" class="small">一次 Planner 调用先生成完整步骤和 arguments</text>

  <rect x="145" y="215" width="335" height="92" class="box"/>
  <text x="312" y="248" text-anchor="middle" class="text">Planner LLM</text>
  <text x="312" y="274" text-anchor="middle" class="small">同时生成 search_notes 与 write_file.content</text>
  <path d="M312 307 L312 350" class="line"/>
  <rect x="105" y="350" width="415" height="132" class="box warn"/>
  <text x="312" y="384" text-anchor="middle" class="text">Plan JSON</text>
  <text x="312" y="412" text-anchor="middle" class="small">step 1: search_notes(query=...)</text>
  <text x="312" y="436" text-anchor="middle" class="small">step 2: write_file(content=预先生成)</text>
  <text x="312" y="463" text-anchor="middle" class="bad">此时检索尚未执行，正文看不到真实证据</text>
  <path d="M312 482 L312 525" class="line"/>
  <rect x="145" y="525" width="335" height="86" class="box muted"/>
  <text x="312" y="558" text-anchor="middle" class="text">Executor 按 Plan 执行</text>
  <text x="312" y="585" text-anchor="middle" class="small">depends_on 只描述顺序，不绑定 Observation</text>
  <rect x="105" y="640" width="415" height="54" class="box warn"/>
  <text x="312" y="674" text-anchor="middle" class="bad">风险：文件内容可能来自模型先验，而非知识库</text>

  <rect x="630" y="112" width="515" height="610" class="lane"/>
  <text x="887" y="151" text-anchor="middle" class="heading">V3.16 DeepAgents Tool Loop</text>
  <text x="887" y="177" text-anchor="middle" class="small">每轮模型只依据当前 messages 决定下一步</text>

  <rect x="735" y="215" width="305" height="78" class="box"/>
  <text x="887" y="246" text-anchor="middle" class="text">Model Call #1</text>
  <text x="887" y="271" text-anchor="middle" class="small">AIMessage: search_notes Tool Call</text>
  <path d="M887 293 L887 330" class="greenLine"/>
  <rect x="735" y="330" width="305" height="82" class="box good"/>
  <text x="887" y="362" text-anchor="middle" class="text">search_notes</text>
  <text x="887" y="388" text-anchor="middle" class="small">执行 Hybrid Retrieval / Reranking</text>
  <path d="M887 412 L887 449" class="greenLine"/>
  <rect x="700" y="449" width="375" height="92" class="box good"/>
  <text x="887" y="482" text-anchor="middle" class="text">ToolMessage</text>
  <text x="887" y="508" text-anchor="middle" class="small">chunk_id · source · content · score · collection</text>
  <path d="M887 541 L887 578" class="greenLine"/>
  <rect x="700" y="578" width="375" height="92" class="box"/>
  <text x="887" y="611" text-anchor="middle" class="text">Model Call #2</text>
  <text x="887" y="637" text-anchor="middle" class="small">读取真实 ToolMessage 后生成 Markdown</text>
  <text x="887" y="661" text-anchor="middle" class="ok">AIMessage: write_file(content=证据驱动)</text>

  <rect x="430" y="735" width="340" height="30" rx="15" fill="#173b51" stroke="#7dd3fc"/>
  <text x="600" y="755" text-anchor="middle" class="small">核心变化：后续参数延迟到 Observation 到达后生成</text>
</svg>
