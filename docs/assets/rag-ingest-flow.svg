<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="620" viewBox="0 0 1180 620" role="img" aria-labelledby="title desc">
  <title id="title">RAG ingest flow</title>
  <desc id="desc">The ingest flow loads local Markdown and PDF documents, extracts metadata, chunks text, creates embeddings, and writes vectors and payloads to Qdrant.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="1180" height="620" fill="#f8fafc"/>
  <text x="590" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">索引阶段：ingest</text>
  <text x="590" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#475569">离线执行：把本地文档变成向量库里的 chunks，运行时 search 才能查到</text>

  <rect x="48" y="122" width="238" height="340" rx="8" fill="#ffffff" stroke="#bfdbfe" stroke-width="2"/>
  <rect x="48" y="122" width="238" height="54" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>
  <text x="167" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#1d4ed8">输入</text>
  <text x="76" y="218" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">Vault / File</text>
  <text x="76" y="252" font-family="Arial, sans-serif" font-size="14" fill="#334155">Markdown notes</text>
  <text x="76" y="282" font-family="Arial, sans-serif" font-size="14" fill="#334155">PDF files</text>
  <text x="76" y="312" font-family="Arial, sans-serif" font-size="14" fill="#334155">CLI path or `RAG_VAULT_PATH`</text>
  <text x="76" y="354" font-family="Arial, sans-serif" font-size="13" fill="#64748b">命令：`obsidian-rag ingest`</text>

  <rect x="356" y="122" width="468" height="340" rx="8" fill="#ffffff" stroke="#bbf7d0" stroke-width="2"/>
  <rect x="356" y="122" width="468" height="54" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="2"/>
  <text x="590" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#047857">Ingest Pipeline</text>
  <rect x="402" y="204" width="150" height="58" rx="8" fill="#ffffff" stroke="#86efac" stroke-width="2"/>
  <text x="477" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#166534">load</text>
  <text x="477" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">解析文档</text>
  <rect x="626" y="204" width="150" height="58" rx="8" fill="#ffffff" stroke="#86efac" stroke-width="2"/>
  <text x="701" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#166534">metadata</text>
  <text x="701" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">title / tags / links</text>
  <rect x="402" y="320" width="150" height="58" rx="8" fill="#ffffff" stroke="#fde047" stroke-width="2"/>
  <text x="477" y="346" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#854d0e">chunk</text>
  <text x="477" y="366" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">切分文本</text>
  <rect x="626" y="320" width="150" height="58" rx="8" fill="#ffffff" stroke="#fdba74" stroke-width="2"/>
  <text x="701" y="346" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#9a3412">embed</text>
  <text x="701" y="366" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">生成向量</text>
  <path d="M552 233 L626 233" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M701 262 C701 292 477 292 477 320" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M552 349 L626 349" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <rect x="894" y="122" width="238" height="340" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <rect x="894" y="122" width="238" height="54" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
  <text x="1013" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#334155">输出</text>
  <text x="922" y="218" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">Qdrant collection</text>
  <text x="922" y="252" font-family="Arial, sans-serif" font-size="14" fill="#334155">vector</text>
  <text x="922" y="282" font-family="Arial, sans-serif" font-size="14" fill="#334155">chunk text</text>
  <text x="922" y="312" font-family="Arial, sans-serif" font-size="14" fill="#334155">payload metadata</text>
  <text x="922" y="354" font-family="Arial, sans-serif" font-size="13" fill="#64748b">search 阶段会读取这里</text>
  <path d="M286 292 L356 292" stroke="#475569" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M824 292 L894 292" stroke="#475569" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>

  <rect x="156" y="510" width="868" height="64" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
  <text x="590" y="538" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#9a3412">ingest 边界</text>
  <text x="590" y="562" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#475569">不调用 chat LLM，不回答问题；只负责建立可检索索引</text>
</svg>
