<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">V3.12 MCP Integration 主流程</title>
  <desc id="desc">FastAPI 或 CLI 通过 McpIntegrationService 和 McpClientManager 启动 stdio MCP Server，执行 initialize、tools/list 和 tools/call。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#071426"/><stop offset="1" stop-color="#102a43"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="5" stdDeviation="7" flood-opacity=".28"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#7dd3fc"/></marker>
    <style>.title{font:700 28px system-ui;fill:#f8fafc}.sub{font:15px system-ui;fill:#bae6fd}.box{rx:17;fill:#132f4c;stroke:#38bdf8;stroke-width:2;filter:url(#shadow)}.green{fill:#123d34;stroke:#34d399}.purple{fill:#2c1d43;stroke:#c084fc}.warn{fill:#422006;stroke:#fbbf24}.head{font:700 17px system-ui;fill:#f8fafc}.text{font:13px system-ui;fill:#cbd5e1}.line{stroke:#7dd3fc;stroke-width:2.5;fill:none;marker-end:url(#arrow)}</style>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <text x="600" y="48" text-anchor="middle" class="title">V3.12 MCP Integration</text>
  <text x="600" y="76" text-anchor="middle" class="sub">显式调用 · stdio Transport · 稳定 Tool/Result Adapter</text>

  <rect x="55" y="150" width="190" height="105" class="box"/><text x="150" y="187" text-anchor="middle" class="head">FastAPI / CLI</text><text x="150" y="216" text-anchor="middle" class="text">Host 发起发现或调用</text><text x="150" y="238" text-anchor="middle" class="text">GET /tools · POST /call</text>
  <rect x="310" y="150" width="220" height="105" class="box"/><text x="420" y="187" text-anchor="middle" class="head">McpIntegrationService</text><text x="420" y="216" text-anchor="middle" class="text">错误归一化 · Trace</text><text x="420" y="238" text-anchor="middle" class="text">结果大小边界</text>
  <rect x="595" y="150" width="220" height="105" class="box green"/><text x="705" y="187" text-anchor="middle" class="head">McpClientManager</text><text x="705" y="216" text-anchor="middle" class="text">Server Registry</text><text x="705" y="238" text-anchor="middle" class="text">短生命周期 Session</text>
  <rect x="880" y="150" width="260" height="105" class="box purple"/><text x="1010" y="187" text-anchor="middle" class="head">stdio MCP Server</text><text x="1010" y="216" text-anchor="middle" class="text">Demo Server / RAG Server</text><text x="1010" y="238" text-anchor="middle" class="text">子进程执行 Tool</text>
  <path d="M245 202 L310 202" class="line"/><path d="M530 202 L595 202" class="line"/><path d="M815 202 L880 202" class="line"/>

  <rect x="170" y="350" width="185" height="82" class="box"/><text x="262" y="384" text-anchor="middle" class="head">initialize</text><text x="262" y="408" text-anchor="middle" class="text">协议版本与能力握手</text>
  <rect x="410" y="350" width="185" height="82" class="box"/><text x="502" y="384" text-anchor="middle" class="head">tools/list</text><text x="502" y="408" text-anchor="middle" class="text">名称、Schema、annotations</text>
  <rect x="650" y="350" width="185" height="82" class="box green"/><text x="742" y="384" text-anchor="middle" class="head">tools/call</text><text x="742" y="408" text-anchor="middle" class="text">Tool 名称 + JSON arguments</text>
  <rect x="890" y="350" width="185" height="82" class="box purple"/><text x="982" y="384" text-anchor="middle" class="head">CallToolResult</text><text x="982" y="408" text-anchor="middle" class="text">Content Blocks + structured</text>
  <path d="M355 391 L410 391" class="line"/><path d="M595 391 L650 391" class="line"/><path d="M835 391 L890 391" class="line"/>

  <rect x="275" y="535" width="280" height="100" class="box green"/><text x="415" y="571" text-anchor="middle" class="head">Tool Adapter</text><text x="415" y="598" text-anchor="middle" class="text">server::tool · input_schema</text><text x="415" y="620" text-anchor="middle" class="text">read_only 仅是提示</text>
  <rect x="645" y="535" width="280" height="100" class="box warn"/><text x="785" y="571" text-anchor="middle" class="head">稳定 API Response</text><text x="785" y="598" text-anchor="middle" class="text">success / failed · duration</text><text x="785" y="620" text-anchor="middle" class="text">安全错误摘要 · Trace</text>
  <path d="M982 432 C982 500 785 490 785 535" class="line"/><path d="M645 585 L555 585" class="line"/>
</svg>
