<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">V3.8.1 Conversation Compaction 主流程</title>
  <desc id="desc">从加载 MySQL Memory、选择旧 Turn、判断双阈值、生成滚动摘要，到 Planner、RAG、Answer 和保存新 Turn 的完整流程。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#071426"/><stop offset="1" stop-color="#102a43"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="5" stdDeviation="7" flood-opacity=".28"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#7dd3fc"/></marker>
    <style>.title{font:700 28px system-ui;fill:#f8fafc}.sub{font:15px system-ui;fill:#bae6fd}.box{rx:18;fill:#132f4c;stroke:#38bdf8;stroke-width:2;filter:url(#shadow)}.green{fill:#123d34;stroke:#34d399}.yellow{fill:#422f0a;stroke:#fbbf24}.purple{fill:#2c1d43;stroke:#c084fc}.head{font:700 18px system-ui;fill:#f8fafc}.text{font:14px system-ui;fill:#cbd5e1}.tag{font:650 12px ui-monospace,monospace;fill:#fbbf24}.line{stroke:#7dd3fc;stroke-width:2.5;fill:none;marker-end:url(#arrow)}.soft{stroke:#64748b;stroke-width:2;fill:none;stroke-dasharray:6 5;marker-end:url(#arrow)}</style>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
  <text x="600" y="48" text-anchor="middle" class="title">V3.8.1 Conversation Compaction 主流程</text>
  <text x="600" y="76" text-anchor="middle" class="sub">压缩的是 LLM 上下文，不是 MySQL 中的原始对话</text>

  <rect x="55" y="125" width="210" height="115" class="box"/>
  <text x="160" y="160" text-anchor="middle" class="head">1. load_memory</text>
  <text x="160" y="190" text-anchor="middle" class="text">读取 summary_text</text><text x="160" y="214" text-anchor="middle" class="text">和 Recent Turns</text>

  <rect x="310" y="125" width="230" height="115" class="box purple"/>
  <text x="425" y="160" text-anchor="middle" class="head">2. 选择候选</text>
  <text x="425" y="190" text-anchor="middle" class="text">摘要截止点之后</text><text x="425" y="214" text-anchor="middle" class="text">Recent Window 之前</text>

  <rect x="585" y="125" width="230" height="115" class="box yellow"/>
  <text x="700" y="160" text-anchor="middle" class="head">3. 双阈值判断</text>
  <text x="700" y="190" text-anchor="middle" class="tag">force / turns / tokens</text><text x="700" y="214" text-anchor="middle" class="text">满足任一条件即可</text>

  <rect x="860" y="125" width="285" height="115" class="box green"/>
  <text x="1002" y="160" text-anchor="middle" class="head">4. 更新 Rolling Summary</text>
  <text x="1002" y="190" text-anchor="middle" class="text">旧 Summary + 新增旧 Turns</text><text x="1002" y="214" text-anchor="middle" class="text">保存新的截止 turn_id</text>

  <path d="M265 182 L310 182" class="line"/><path d="M540 182 L585 182" class="line"/><path d="M815 182 L860 182" class="line"/>

  <rect x="145" y="335" width="190" height="100" class="box"/>
  <text x="240" y="370" text-anchor="middle" class="head">5. planner</text><text x="240" y="400" text-anchor="middle" class="text">摘要 + 最近原文</text>
  <rect x="390" y="335" width="190" height="100" class="box"/>
  <text x="485" y="370" text-anchor="middle" class="head">6. RAG Steps</text><text x="485" y="400" text-anchor="middle" class="text">检索与 Evidence</text>
  <rect x="635" y="335" width="190" height="100" class="box green"/>
  <text x="730" y="370" text-anchor="middle" class="head">7. Answer</text><text x="730" y="400" text-anchor="middle" class="text">Memory + chunks</text>
  <rect x="880" y="335" width="190" height="100" class="box purple"/>
  <text x="975" y="370" text-anchor="middle" class="head">8. save_memory</text><text x="975" y="400" text-anchor="middle" class="text">追加本轮 Raw Turn</text>

  <path d="M1002 240 C1002 285 240 280 240 335" class="line"/><path d="M335 385 L390 385" class="line"/><path d="M580 385 L635 385" class="line"/><path d="M825 385 L880 385" class="line"/>
  <path d="M700 240 C700 290 240 285 240 335" class="soft"/>
  <text x="540" y="296" text-anchor="middle" class="tag">未触发或失败：保留旧 Memory，继续主流程</text>

  <rect x="85" y="535" width="1030" height="145" rx="22" fill="#0c2138" stroke="#64748b" stroke-width="2"/>
  <text x="600" y="574" text-anchor="middle" class="head">持久化边界</text>
  <rect x="130" y="600" width="270" height="50" rx="14" fill="#132f4c" stroke="#38bdf8"/><text x="265" y="631" text-anchor="middle" class="text">Raw Turns：完整事实来源</text>
  <rect x="465" y="600" width="270" height="50" rx="14" fill="#2c1d43" stroke="#c084fc"/><text x="600" y="631" text-anchor="middle" class="text">Summary：可重建派生状态</text>
  <rect x="800" y="600" width="270" height="50" rx="14" fill="#123d34" stroke="#34d399"/><text x="935" y="631" text-anchor="middle" class="text">Recent Turns：最近原文窗口</text>
  <text x="600" y="714" text-anchor="middle" class="sub">Compaction 失败采用 fail-open：不能让摘要优化阻断正常问答</text>
</svg>
