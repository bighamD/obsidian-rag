<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">V3.3 to V3.4 comparison</title>
  <desc id="desc">V3.3 executes a LangGraph tool workflow. V3.4 adds a planner-only phase that produces structured plan JSON before execution.</desc>
  <rect width="980" height="420" fill="#f8fafc"/>
  <text x="490" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">V3.3 到 V3.4 的核心变化</text>

  <rect x="54" y="78" width="400" height="280" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="254" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#1d4ed8">V3.3 LangGraph</text>
  <rect x="96" y="152" width="316" height="44" rx="8" fill="#dbeafe" stroke="#93c5fd"/>
  <text x="254" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#111827">select_tool</text>
  <rect x="96" y="214" width="316" height="44" rx="8" fill="#e0f2fe" stroke="#7dd3fc"/>
  <text x="254" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#111827">search_notes / no_search / clarify</text>
  <rect x="96" y="276" width="316" height="44" rx="8" fill="#ecfeff" stroke="#67e8f9"/>
  <text x="254" y="304" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#111827">evidence_check -> answer</text>
  <text x="254" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#475569">重点：用 graph 编排工具调用流程</text>

  <rect x="526" y="78" width="400" height="280" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="726" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#047857">V3.4 Planner</text>
  <rect x="568" y="152" width="316" height="44" rx="8" fill="#dcfce7" stroke="#86efac"/>
  <text x="726" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#111827">question + constraints</text>
  <rect x="568" y="214" width="316" height="44" rx="8" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="726" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#111827">LangGraph planner nodes</text>
  <rect x="568" y="276" width="316" height="44" rx="8" fill="#f7fee7" stroke="#bef264"/>
  <text x="726" y="304" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#111827">返回 plan + trace，不执行检索</text>
  <text x="726" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#475569">重点：把复杂问题拆成可执行步骤</text>

  <path d="M454 218 C480 218 500 218 526 218" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
