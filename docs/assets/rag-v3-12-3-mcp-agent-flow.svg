<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">V3.12.3 MCP Agent Integration 主流程</title>
  <desc id="desc">用户请求经过 Tool-aware Planner，分别执行本地 RAG 与 MCP Tool，随后由 ContextBuilder 合并知识块和工具观察结果并生成答案。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#071426"/><stop offset="1" stop-color="#102a43"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="5" stdDeviation="7" flood-opacity=".28"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#7dd3fc"/></marker>
    <style>.title{font:700 28px system-ui;fill:#f8fafc}.sub{font:15px system-ui;fill:#bae6fd}.box{rx:16;fill:#132f4c;stroke:#38bdf8;stroke-width:2;filter:url(#shadow)}.green{fill:#123d34;stroke:#34d399}.yellow{fill:#422006;stroke:#fbbf24}.purple{fill:#312e5f;stroke:#a78bfa}.text{font:650 17px system-ui;fill:#f8fafc}.small{font:13px system-ui;fill:#cbd5e1}.line{stroke:#7dd3fc;stroke-width:2.5;fill:none;marker-end:url(#arrow)}.dash{stroke:#a78bfa;stroke-width:2;fill:none;stroke-dasharray:7 6;marker-end:url(#arrow)}</style>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
  <text x="600" y="48" text-anchor="middle" class="title">V3.12.3 MCP Agent Integration</text>
  <text x="600" y="76" text-anchor="middle" class="sub">Tool Catalog → Planner Selection → Unified Executor → Context → Answer</text>

  <rect x="60" y="120" width="220" height="92" class="box"/><text x="170" y="154" text-anchor="middle" class="text">Agent Console</text><text x="170" y="181" text-anchor="middle" class="small">JSON / SSE / answer_delta</text>
  <rect x="360" y="120" width="250" height="92" class="box green"/><text x="485" y="154" text-anchor="middle" class="text">Tool-aware Planner</text><text x="485" y="181" text-anchor="middle" class="small">search / tool / synthesize</text>
  <rect x="690" y="120" width="250" height="92" class="box purple"/><text x="815" y="154" text-anchor="middle" class="text">Unified ToolRegistry</text><text x="815" y="181" text-anchor="middle" class="small">local + server::tool</text>
  <path d="M280 166 L360 166" class="line"/><path d="M610 166 L690 166" class="line"/>

  <rect x="80" y="315" width="290" height="130" class="box"/><text x="225" y="350" text-anchor="middle" class="text">Local search_notes</text><text x="225" y="378" text-anchor="middle" class="small">Hybrid Retrieval → RRF</text><text x="225" y="402" text-anchor="middle" class="small">V3.12.2 Reranker</text><text x="225" y="426" text-anchor="middle" class="small">Knowledge Chunks</text>
  <rect x="470" y="315" width="290" height="130" class="box green"/><text x="615" y="350" text-anchor="middle" class="text">MCP Tool Executor</text><text x="615" y="378" text-anchor="middle" class="small">McpConnectionManager</text><text x="615" y="402" text-anchor="middle" class="small">persistent Session / reconnect</text><text x="615" y="426" text-anchor="middle" class="small">Tool Observation</text>
  <rect x="860" y="315" width="260" height="130" class="box yellow"/><text x="990" y="350" text-anchor="middle" class="text">no_search / clarify</text><text x="990" y="378" text-anchor="middle" class="small">没有匹配工具</text><text x="990" y="402" text-anchor="middle" class="small">或用户问题不明确</text>
  <path d="M815 212 C815 265 225 265 225 315" class="line"/><path d="M815 212 C815 270 615 270 615 315" class="line"/><path d="M815 212 C815 270 990 270 990 315" class="line"/>

  <rect x="310" y="535" width="340" height="118" class="box purple"/><text x="480" y="571" text-anchor="middle" class="text">ContextBuilder</text><text x="480" y="599" text-anchor="middle" class="small">included_chunks[]</text><text x="480" y="623" text-anchor="middle" class="small">tool_observations[]</text>
  <rect x="760" y="535" width="300" height="118" class="box green"/><text x="910" y="571" text-anchor="middle" class="text">Answer + Memory</text><text x="910" y="599" text-anchor="middle" class="small">可见答案增量</text><text x="910" y="623" text-anchor="middle" class="small">sources + tool_calls</text>
  <path d="M225 445 C225 500 405 500 405 535" class="line"/><path d="M615 445 C615 500 555 500 555 535" class="line"/><path d="M650 594 L760 594" class="line"/>
  <path d="M990 445 C990 490 910 490 910 535" class="dash"/>

  <text x="600" y="710" text-anchor="middle" class="sub">本版只自动调用 YAML allowlist 中的只读 MCP Tools；Permission Policy 留到 V3.13</text>
</svg>
