<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="460" viewBox="0 0 1080 460" role="img" aria-labelledby="title desc">
  <title id="title">V3.2 tool calling flow</title>
  <desc id="desc">The model receives tools, returns a tool call, code executes the tool, and the model answers from the tool result.</desc>
  <rect width="1080" height="460" fill="#fbfcfe"/>
  <text x="540" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">V3.2 Tool Calling 流程</text>

  <rect x="52" y="96" width="150" height="56" rx="8" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
  <text x="127" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#1e3a8a">用户问题</text>
  <path d="M202 124 L278 124" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="278" y="78" width="230" height="92" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="393" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#14532d">LLM + Tools Schema</text>
  <text x="393" y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#166534">search_notes / no_search / clarify</text>
  <text x="393" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#166534">tool_choice=auto</text>

  <path d="M508 124 L590 124" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="590" y="80" width="210" height="88" rx="8" fill="#fef9c3" stroke="#eab308" stroke-width="2"/>
  <text x="695" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#713f12">tool_calls</text>
  <text x="695" y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#713f12">function.name</text>
  <text x="695" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#713f12">function.arguments</text>

  <path d="M695 168 L695 218" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="585" y="218" width="220" height="54" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="695" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0f172a">代码执行被选择的工具</text>

  <path d="M585 245 L392 328" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M695 272 L695 328" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M805 245 L996 328" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="230" y="330" width="190" height="58" rx="8" fill="#e0f2fe" stroke="#38bdf8" stroke-width="2"/>
  <text x="325" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#075985">search_notes</text>
  <text x="325" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0369a1">检索知识库并返回证据</text>

  <rect x="600" y="330" width="190" height="58" rx="8" fill="#fee2e2" stroke="#f87171" stroke-width="2"/>
  <text x="695" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#7f1d1d">no_search</text>
  <text x="695" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#991b1b">直接说明能力边界</text>

  <rect x="858" y="330" width="190" height="58" rx="8" fill="#ede9fe" stroke="#a78bfa" stroke-width="2"/>
  <text x="953" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#4c1d95">clarify</text>
  <text x="953" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5b21b6">先向用户追问</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
