<svg xmlns="http://www.w3.org/2000/svg" width="1260" height="760" viewBox="0 0 1260 760" role="img" aria-labelledby="title desc">
  <title id="title">V3.11.2 LangChain and LlamaIndex comparison flow</title>
  <desc id="desc">One Docling Markdown input branches into LangChain parent retrieval, LlamaIndex hierarchical auto merging and LlamaIndex semantic splitting, then returns a unified comparison.</desc>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/></marker></defs>
  <rect width="1260" height="760" fill="#f8fafc"/>
  <text x="630" y="46" text-anchor="middle" font-family="Arial, sans-serif" font-size="27" font-weight="700" fill="#0f172a">V3.11.2 Chunking Framework Comparison</text>
  <text x="630" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#475569">同一个 Docling Markdown、query 和 embedding，比较三种框架策略</text>

  <rect x="430" y="108" width="400" height="92" rx="9" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
  <text x="630" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#1d4ed8">DoclingDocument.export_to_markdown()</text>
  <text x="630" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#475569">common source + metadata + query + embedding client</text>

  <path d="M630 200 L630 238" stroke="#475569" stroke-width="2"/>
  <path d="M215 238 L1045 238" stroke="#475569" stroke-width="2"/>
  <path d="M215 238 L215 278" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M630 238 L630 278" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M1045 238 L1045 278" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="40" y="284" width="350" height="300" rx="9" fill="#ffffff" stroke="#bfdbfe" stroke-width="2"/>
  <rect x="40" y="284" width="350" height="56" rx="9" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>
  <text x="215" y="319" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#1d4ed8">LangChain</text>
  <text x="72" y="382" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#0f172a">RecursiveCharacterTextSplitter</text>
  <text x="92" y="414" font-family="Arial, sans-serif" font-size="13" fill="#475569">parent documents</text>
  <text x="92" y="442" font-family="Arial, sans-serif" font-size="13" fill="#475569">child documents</text>
  <text x="72" y="486" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#0f172a">ParentDocumentRetriever</text>
  <text x="92" y="518" font-family="Arial, sans-serif" font-size="13" fill="#475569">child vector hit</text>
  <text x="92" y="546" font-family="Arial, sans-serif" font-size="13" fill="#475569">return parent context</text>

  <rect x="455" y="284" width="350" height="300" rx="9" fill="#ffffff" stroke="#bbf7d0" stroke-width="2"/>
  <rect x="455" y="284" width="350" height="56" rx="9" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="2"/>
  <text x="630" y="319" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#047857">LlamaIndex Hierarchical</text>
  <text x="487" y="382" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#0f172a">HierarchicalNodeParser</text>
  <text x="507" y="414" font-family="Arial, sans-serif" font-size="13" fill="#475569">parent nodes</text>
  <text x="507" y="442" font-family="Arial, sans-serif" font-size="13" fill="#475569">leaf nodes</text>
  <text x="487" y="486" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#0f172a">AutoMergingRetriever</text>
  <text x="507" y="518" font-family="Arial, sans-serif" font-size="13" fill="#475569">retrieve leaves</text>
  <text x="507" y="546" font-family="Arial, sans-serif" font-size="13" fill="#475569">merge parent context</text>

  <rect x="870" y="284" width="350" height="300" rx="9" fill="#ffffff" stroke="#fed7aa" stroke-width="2"/>
  <rect x="870" y="284" width="350" height="56" rx="9" fill="#fff7ed" stroke="#fed7aa" stroke-width="2"/>
  <text x="1045" y="319" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#c2410c">LlamaIndex Semantic</text>
  <text x="902" y="382" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#0f172a">SemanticSplitterNodeParser</text>
  <text x="922" y="414" font-family="Arial, sans-serif" font-size="13" fill="#475569">sentence groups</text>
  <text x="922" y="442" font-family="Arial, sans-serif" font-size="13" fill="#475569">embedding distance</text>
  <text x="902" y="486" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#0f172a">VectorStoreIndex</text>
  <text x="922" y="518" font-family="Arial, sans-serif" font-size="13" fill="#475569">semantic nodes</text>
  <text x="922" y="546" font-family="Arial, sans-serif" font-size="13" fill="#475569">retrieve topic context</text>

  <path d="M215 584 L215 626 L630 626" stroke="#475569" stroke-width="2" fill="none"/>
  <path d="M630 584 L630 626" stroke="#475569" stroke-width="2" fill="none"/>
  <path d="M1045 584 L1045 626 L630 626" stroke="#475569" stroke-width="2" fill="none"/>
  <path d="M630 626 L630 660" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="350" y="666" width="560" height="64" rx="9" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
  <text x="630" y="694" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#334155">FrameworkCompareResponse</text>
  <text x="630" y="716" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#475569">chunks / hits / parent context / build_ms / statistics；不写共享 Qdrant</text>
</svg>
