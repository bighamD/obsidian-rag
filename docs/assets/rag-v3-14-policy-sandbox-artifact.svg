<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Permission、Sandbox 与 Artifact 的职责边界</title><desc id="desc">展示 Permission 决定是否执行，Sandbox 控制执行环境，Artifact 管理输出文件。</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#081b34"/><stop offset="1" stop-color="#123a55"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="9" stdDeviation="11" flood-opacity=".35"/></filter><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0V6L9 3Z" fill="#72cdfb"/></marker></defs><rect width="1600" height="900" fill="url(#bg)"/>
  <text x="85" y="92" fill="#f5f9fc" font-size="41" font-family="Arial" font-weight="700">三层控制，不能互相替代</text><text x="85" y="137" fill="#abc4d8" font-size="21" font-family="Arial">授权、隔离和输出治理分别解决不同风险</text>
  <g filter="url(#s)" font-family="Arial">
    <rect x="95" y="240" width="390" height="360" rx="20" fill="#3a3156" stroke="#bb99ff"/><text x="135" y="305" fill="#d1b6ff" font-size="30" font-weight="700">Permission</text><text x="135" y="360" fill="#fff" font-size="24">能不能执行？</text><text x="135" y="425" fill="#d9cfe7" font-size="19">allowlist</text><text x="135" y="465" fill="#d9cfe7" font-size="19">required permission</text><text x="135" y="505" fill="#d9cfe7" font-size="19">JSON Schema · risk</text><text x="135" y="555" fill="#ffd36f" font-size="18">输出 allow / confirm / deny</text>
    <rect x="605" y="220" width="390" height="400" rx="20" fill="#133f42" stroke="#55d5b3" stroke-width="2"/><text x="645" y="290" fill="#76e0c0" font-size="30" font-weight="700">Sandbox</text><text x="645" y="345" fill="#fff" font-size="24">在哪里、以什么资源执行？</text><text x="645" y="410" fill="#c1d9d4" font-size="19">Workspace 路径边界</text><text x="645" y="450" fill="#c1d9d4" font-size="19">Docker 文件系统与网络</text><text x="645" y="490" fill="#c1d9d4" font-size="19">CPU · memory · timeout</text><text x="645" y="540" fill="#7de0bd" font-size="18">返回 stdout / stderr / exit code</text>
    <rect x="1115" y="240" width="390" height="360" rx="20" fill="#493a1c" stroke="#efc45f"/><text x="1155" y="305" fill="#ffd778" font-size="30" font-weight="700">Artifact</text><text x="1155" y="360" fill="#fff" font-size="24">输出文件如何被安全使用？</text><text x="1155" y="425" fill="#e3d7b8" font-size="19">relative_path · MIME</text><text x="1155" y="465" fill="#e3d7b8" font-size="19">size · SHA-256</text><text x="1155" y="505" fill="#e3d7b8" font-size="19">artifact_id · download</text><text x="1155" y="555" fill="#ffd36f" font-size="18">不直接暴露任意宿主机路径</text>
  </g>
  <g stroke="#72cdfb" stroke-width="5" fill="none" marker-end="url(#a)"><path d="M485 420H590"/><path d="M995 420H1100"/></g>
  <rect x="250" y="710" width="1100" height="95" rx="16" fill="#0c263e" stroke="#37698c"/><text x="800" y="765" text-anchor="middle" fill="#f2f7fb" font-size="23" font-family="Arial">PlanStep → PermissionDecision → Container Result → ArtifactRecord</text>
</svg>
